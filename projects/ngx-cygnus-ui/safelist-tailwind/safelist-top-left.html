<!-- Safelist: Floating label utilities -->
<div class="hidden">

  <!-- Top (positive) -->
  <div class="top-0 top-0.5 top-1 top-1.5 top-2 top-2.5 top-3 top-3.5 top-4 top-5 top-6 top-7 top-8"></div>

  <!-- Top (negative) -->
  <div class="-top-0.5 -top-1 -top-1.5 -top-2 -top-2.5 -top-3 -top-3.5 -top-4"></div>

  <!-- Left (positive) -->
  <div class="left-0 left-0.5 left-1 left-1.5 left-2 left-2.5 left-3 left-3.5 left-4 left-5 left-6"></div>

  <!-- Left (negative) -->
  <div class="-left-0.5 -left-1 -left-1.5 -left-2 -left-2.5 -left-3"></div>

  <!-- Typography -->
  <div class="text-xs text-sm text-base text-lg"></div>

  <!-- Scale -->
  <div class="scale-75 scale-90 scale-95 scale-100 scale-105"></div>

  <!-- Transform / Transition -->
  <div class="transition-all transform origin-left origin-top-left origin-top"></div>

  <!-- Border Radius -->
  <div class="rounded rounded-md rounded-lg rounded-xl rounded-2xl rounded-full"></div>

  <!-- Peer focus variants -->
  <div class="peer-focus:-top-0.5 peer-focus:-top-1 peer-focus:-top-1.5 peer-focus:-top-2 peer-focus:-top-2.5 peer-focus:-top-3"></div>
  <div class="peer-focus:top-0 peer-focus:top-1 peer-focus:top-2 peer-focus:top-3"></div>
  <div class="peer-focus:left-0 peer-focus:left-1 peer-focus:left-1.5 peer-focus:left-2 peer-focus:left-2.5 peer-focus:left-3 peer-focus:left-4"></div>
  <div class="peer-focus:text-xs peer-focus:text-sm peer-focus:text-base"></div>
  <div class="peer-focus:scale-75 peer-focus:scale-90 peer-focus:scale-95 peer-focus:scale-100"></div>

  <!-- Peer placeholder-shown variants -->
  <div class="peer-placeholder-shown:top-1 peer-placeholder-shown:top-2 peer-placeholder-shown:top-3 peer-placeholder-shown:top-4 peer-placeholder-shown:top-5"></div>
  <div class="peer-placeholder-shown:left-0 peer-placeholder-shown:left-1 peer-placeholder-shown:left-2 peer-placeholder-shown:left-2.5 peer-placeholder-shown:left-3 peer-placeholder-shown:left-4"></div>
  <div class="peer-placeholder-shown:text-xs peer-placeholder-shown:text-sm peer-placeholder-shown:text-base peer-placeholder-shown:text-lg"></div>
  <div class="peer-placeholder-shown:scale-90 peer-placeholder-shown:scale-95 peer-placeholder-shown:scale-100 peer-placeholder-shown:scale-105"></div>

</div>
