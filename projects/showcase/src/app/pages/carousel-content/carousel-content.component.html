<cygnus-carousel [seconds]="5" [itemsInput]="carouselItems" />


<cygnus-carousel [mode]="'manual'" [itemsInput]="carouselItems" [triggerNext]="setCarouselItem()" />

<cygnus-button
  [btnTypes]="'btn-primary btn-icon-xl btn-icon-only-size-xs'"
  [btnIconRouteRight]="'assets/icons/svg/General/plus.svg'"
  (click)="changeCarouselItem()"
></cygnus-button>

<br>
<br>
<hr>

<cygnus-one-item-carousel [item]="currentOneItemCarouselItem()" />

<cygnus-button
  [btnTypes]="'btn-primary btn-icon-xl btn-icon-only-size-xs'"
  [btnIconRouteRight]="'assets/icons/svg/General/plus.svg'"
  (click)="changeOneItemCarouselItem()"
></cygnus-button>

<br>
<br>
<hr>

<cygnus-one-item-carousel [item]="currentOneItemCarouselItem2()" [autoPlay]="true" />

<cygnus-button
  [btnTypes]="'btn-primary btn-icon-xl btn-icon-only-size-xs'"
  [btnIconRouteRight]="'assets/icons/svg/General/plus.svg'"
  (click)="changeOneItemCarouselItem2()"
></cygnus-button>
